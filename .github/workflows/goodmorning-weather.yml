name: 玉山带伞提醒（高德版·智能推送）

on:
  schedule:
    - cron: '30 22 * * *'   # UTC 22:30 = 北京 06:30（出门前提醒）
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: 获取天气 → 智能判断是否推送
        env:
          WECOM_WEBHOOK_KEY: ${{ secrets.WECOM_WEBHOOK_KEY }}
          CITY:              ${{ secrets.CITY }}
          GAODE_KEY:         ${{ secrets.GAODE_KEY }}
        shell: python
        run: |
          import os, requests, datetime, time, random

          key  = os.getenv('WECOM_WEBHOOK_KEY')
          city = os.getenv('CITY') or '玉山县'
          ak   = os.getenv('GAODE_KEY')
          if not ak:
              raise RuntimeError('请在仓库 Secrets 里配置 GAODE_KEY')

          wx_url = f'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key={key}'
          sess = requests.Session()
          sess.headers.update({'User-Agent': 'github-actions/1.0'})

          adcode = '361123'

          realtime_url = (
              'https://restapi.amap.com/v3/weather/weatherInfo'
              f'?key={ak}&city={adcode}&extensions=base'
          )
          forecast_url = (
              'https://restapi.amap.com/v3/weather/weatherInfo'
              f'?key={ak}&city={adcode}&extensions=all'
          )

          def get_json(url):
              for attempt in range(1, 6):
                  try:
                      r = sess.get(url, timeout=30).json()
                      if r.get('status') != '1':
                          raise RuntimeError(f"API错误: {r.get('info', '未知错误')}")
                      return r
                  except Exception as e:
                      print(f'[高德 attempt {attempt}] {e}')
                      if attempt == 5:
                          print('⚠️ 天气接口异常，今日不推送')
                          exit(0)
                      time.sleep(random.uniform(2, 5))

          realtime_resp = get_json(realtime_url)
          forecast_resp = get_json(forecast_url)

          now = realtime_resp['lives'][0]
          skycon = now['weather']
          temp = int(float(now.get('temperature_float') or now['temperature']))
          
          today_forecast = forecast_resp['forecasts'][0]['casts'][0]
          day_weather = today_forecast['dayweather']
          night_weather = today_forecast['nightweather']
          day_pop = int(today_forecast.get('daypower', 0))
          night_pop = int(today_forecast.get('nightpower', 0))

          print(f"当前天气: {skycon}, 温度: {temp}°C")
          print(f"今日白天: {day_weather}, 降水概率: {day_pop}%")
          print(f"今日夜间: {night_weather}, 降水概率: {night_pop}%")

          rain_keywords = ['雨', '阵雨', '雷阵雨', '小雨', '中雨', '大雨', '暴雨', 
                          '大暴雨', '特大暴雨', '雨雪', '冻雨']
          
          is_raining_now = any(k in skycon for k in rain_keywords)
          will_rain_day = any(k in day_weather for k in rain_keywords)
          high_rain_prob = day_pop >= 30 or night_pop >= 30
          
          need_umbrella = is_raining_now or will_rain_day or high_rain_prob

          print(f"判断结果: 当前下雨={is_raining_now}, 白天有雨={will_rain_day}, 高概率={high_rain_prob}")
          print(f"是否需要带伞: {need_umbrella}")

          if not need_umbrella:
              print('✅ 今日无雨，无需提醒，静默退出')
              exit(0)

          heavy_rain = any(k in skycon or k in day_weather 
                          for k in ['大雨', '暴雨', '大暴雨', '特大暴雨'])
          
          if heavy_rain:
              warning = "🌧️ **雨势较大，请备好雨具，注意出行安全！**"
          elif is_raining_now:
              warning = "☔ **当前正在下雨，出门记得带伞，路面湿滑请小心！**"
          else:
              warning = "☂️ **今日有雨，建议出门带伞，以防万一~**"

          md = f"""**{warning}**  

📍 `{datetime.date.today()}` · {city}  
🌤️ 当前天气：{skycon}（{temp}°C）  
📅 白天预报：{day_weather}（降水概率 {day_pop}%）  
🌙 夜间预报：{night_weather}（降水概率 {night_pop}%）  

💡 雨天路滑，注意安全，祝出行顺利！"""

          r = sess.post(wx_url, json={"msgtype": "markdown", "markdown": {"content": md}})
          
          if r.status_code == 200:
              print('✅ 带伞提醒推送成功')
          else:
              print(f'❌ 推送失败: {r.status_code} - {r.text}')
              exit(1)
